<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh UTC2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CHẾ ĐỘ SÁNG (MẶC ĐỊNH) */
        :root {
            --bg-color: #eaf1f9;
            --card-color: #ffffff;
            --primary-color: #003366;
            --accent-color: #4da6ff;
            --success: #27ae60;
            --error: #e74c3c;
            --golden: #f1c40f;
            --input-bg: #f4f8fd;
            --input-border: #e0e9f5;
            
            --light-shadow: -8px -8px 16px rgba(255, 255, 255, 0.8);
            --dark-shadow: 8px 8px 16px rgba(0, 51, 102, 0.1);
            --inset-light: inset -4px -4px 8px rgba(255, 255, 255, 1);
            --inset-dark: inset 4px 4px 8px rgba(0, 51, 102, 0.05);
        }

        /* CHẾ ĐỘ TỐI (DARK MODE) */
        body.dark-mode {
            --bg-color: #1a1e24;
            --card-color: #1a1e24;
            --primary-color: #e0e9f5; /* Chữ màu sáng */
            --accent-color: #66b3ff;
            --input-bg: #14171c; /* Nền ô nhập liệu tối hơn nền xíu */
            --input-border: #232830;
            
            --light-shadow: -8px -8px 16px rgba(255, 255, 255, 0.03); /* Bóng sáng mờ đi */
            --dark-shadow: 8px 8px 16px rgba(0, 0, 0, 0.4); /* Bóng tối đậm lên */
            --inset-light: inset -4px -4px 8px rgba(255, 255, 255, 0.02);
            --inset-dark: inset 4px 4px 8px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .neumorphic-card-light {
            background: var(--card-color);
            padding: 55px 30px 40px 30px;
            border-radius: 30px;
            box-shadow: var(--dark-shadow), var(--light-shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Công tắc Dark Mode */
        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .theme-switch {
            display: inline-block;
            height: 24px;
            position: relative;
            width: 46px;
        }

        .theme-switch input {
            display: none;
        }

        .slider {
            background-color: #cbd4db;
            bottom: 0;
            cursor: pointer;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transition: .4s;
            border-radius: 24px;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1);
        }

        .slider:before {
            background-color: #fff;
            bottom: 3px;
            content: "";
            height: 18px;
            left: 3px;
            position: absolute;
            transition: .4s;
            width: 18px;
            border-radius: 50%;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* Dải ruy băng mừng ngày 30/4 */
        .celebration-ribbon {
            position: absolute;
            top: 15px;
            right: -35px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: var(--golden);
            padding: 7px 40px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transform: rotate(45deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            background: var(--card-color);
            box-shadow: var(--dark-shadow), var(--light-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float-light 6s ease-in-out infinite;
            transition: all 0.4s ease;
        }

        @keyframes float-light {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px) rotate(3deg); }
            100% { transform: translateY(0px); }
        }

        .logo-school {
            width: 95px;
            height: auto;
        }

        h2 {
            font-size: 22px;
            font-weight: 900;
            margin: 0 0 8px 0;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .uni-name {
            font-size: 13px;
            color: #8a9ba8;
            margin-bottom: 30px;
            font-weight: 500;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 100%;
            height: 55px;
            background: var(--input-bg); 
            border: 2px solid var(--input-border); 
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
            text-align: center;
            box-sizing: border-box;
            box-shadow: var(--inset-dark), var(--inset-light);
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Roboto', sans-serif;
            margin: 0;
        }

        input[type="number"]::placeholder {
            color: #8a9ba8;
            font-weight: 500;
        }

        input[type="number"]:focus {
            background: var(--card-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(77, 166, 255, 0.2), var(--inset-dark); 
        }

        button#btnSubmit {
            width: 100%;
            height: 55px;
            background: linear-gradient(135deg, #66b3ff 0%, #0073e6 100%);
            color: #ffffff;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 5px 5px 12px rgba(0, 115, 230, 0.2), 
                       -5px -5px 12px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button#btnSubmit:active {
            transform: translateY(2px);
        }

        button#btnSubmit:disabled {
            background: #cbd4db;
            color: #8a9ba8;
            cursor: not-allowed;
            box-shadow: none;
        }

        body.dark-mode button#btnSubmit:disabled {
            background: #2a3038;
            color: #5a6673;
        }

        #status-container {
            margin-top: 25px;
            min-height: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loader {
            display: none;
            width: 26px;
            height: 26px;
            border: 3px solid var(--input-border);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #8a9ba8;
            font-weight: 500;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="neumorphic-card-light">
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" onchange="toggleTheme(this)" />
            <div class="slider round"></div>
        </label>
    </div>

    <div class="celebration-ribbon">⭐ 30/4 ⭐</div>

    <div class="logo-container">
        <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/03/Logo-Dai-Hoc-Giao-Thong-Van-Tai-UTC.png" class="logo-school" alt="UTC Logo">
    </div>
    
    <h2>ĐIỂM DANH SINH VIÊN</h2>
    <div class="uni-name">Trường Đại học Giao thông Vận tải<br>Phân hiệu tại TP.HCM</div>

    <div class="input-group">
        <input type="number" id="mssv" placeholder="Nhập mã số sinh viên" autocomplete="off">
    </div>

    <button onclick="handleAttendance()" id="btnSubmit">
        <span>XÁC NHẬN CÓ MẶT</span>
    </button>

    <div id="status-container">
        <div class="loader" id="spinner"></div>
        <div id="status" style="font-weight: 700; font-size: 15px;">Sẵn sàng kết nối</div>
    </div>

    <div class="footer">
        Chào mừng 51 năm Ngày Giải phóng miền Nam (30/4/1975 - 30/4/2026)<br>
        © 2026 Nghiên cứu khoa học<br>
        Bảo mật: ESP32 BLE + Cloud Anti-Cheat
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwB3JIlliq5Qsd53uEH6UdsxS-WjNE6yO4DQkTeeYYbNuNeSiNEul4XWzZoOVLIMua8/exec'; 
    const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
    const CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

    // Xử lý bật/tắt Dark Mode và lưu vào bộ nhớ web
    const toggleSwitch = document.getElementById('checkbox');
    const currentTheme = localStorage.getItem('utc2_theme');

    if (currentTheme) {
        document.body.classList.add(currentTheme);
        if (currentTheme === 'dark-mode') {
            toggleSwitch.checked = true;
        }
    }

    function toggleTheme(e) {
        if (e.checked) {
            document.body.classList.add('dark-mode');
            localStorage.setItem('utc2_theme', 'dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
            localStorage.setItem('utc2_theme', 'light-mode');
        }    
    }

    function getDeviceId() {
        let id = localStorage.getItem('utc2_device_id');
        if (!id) {
            id = 'UTC2-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('utc2_device_id', id);
        }
        return id;
    }

    async function handleAttendance() {
        const mssvInput = document.getElementById('mssv');
        const mssv = mssvInput.value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('spinner');

        if (!mssv) {
            status.style.color = "var(--error)";
            status.innerText = "❌ Vui lòng nhập MSSV!";
            return;
        }

        try {
            btn.disabled = true;
            loader.style.display = "block";
            status.style.color = "var(--accent-color)";
            status.innerText = "🔍 Đang tìm Trạm BLE...";

            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'TRAM-DIEM-DANH' }],
                optionalServices: [SERVICE_UUID]
            });

            status.innerText = "🔗 Kiểm tra bảo mật...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_UUID);

            const challenge = Math.floor(Math.random() * 9000) + 1000;
            await characteristic.writeValue(new TextEncoder().encode(challenge.toString()));
            
            await new Promise(r => setTimeout(r, 250)); 

            const value = await characteristic.readValue();
            const response = new TextDecoder().decode(value);
            
            device.gatt.disconnect();

            status.innerText = "☁️ Đang đồng bộ Cloud...";
            const finalUrl = `${scriptURL}?mssv=${mssv}&challenge=${challenge}&response=${response}&deviceId=${getDeviceId()}`;
            
            const apiRes = await fetch(finalUrl);
            const result = await apiRes.text();
            
            loader.style.display = "none";
            btn.disabled = false;

            if (result.includes("Thành công")) {
                status.style.color = "var(--success)";
                status.innerHTML = "✅ " + result;
                mssvInput.value = ""; 
            } else {
                status.style.color = "var(--error)";
                status.innerHTML = "⚠️ " + result;
            }

        } catch (err) {
            loader.style.display = "none";
            btn.disabled = false;
            status.style.color = "var(--error)";
            status.innerText = "❌ Lỗi: Kết nối thất bại!";
            console.error(err);
        }
    }
</script>

</body>
</html>
