<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ Thống Điểm Danh UTC2</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root {
    --primary-color: #003366;
    --accent-color: #4da6ff;
    --success: #27ae60;
    --error: #e74c3c;
}

/* ===== BACKGROUND 30/4 ===== */
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #eaf1f9 0%, #fff0f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 30px 15px;
    position: relative;
    overflow-x: hidden;
}

/* ánh sáng nền */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,0,0,0.2), transparent);
    top: -100px;
    left: -100px;
}

body::after {
    content: "";
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(255,215,0,0.25), transparent);
    bottom: -100px;
    right: -100px;
}

/* pháo hoa nhẹ */
.fireworks {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background-image: radial-gradient(circle, rgba(255,0,0,0.3) 2px, transparent 2px),
                      radial-gradient(circle, rgba(255,215,0,0.3) 2px, transparent 2px);
    background-size: 60px 60px;
    animation: sparkle 6s linear infinite;
}

@keyframes sparkle {
    from { background-position: 0 0, 30px 30px; }
    to { background-position: 60px 60px, 90px 90px; }
}

/* CARD */
.neumorphic-card-light {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.75);
    border-radius: 25px;
    padding: 40px 25px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    position: relative;
    z-index: 2;
}

/* ribbon */
.celebration-ribbon {
    position: absolute;
    top: 10px;
    right: -35px;
    background: linear-gradient(135deg, red, darkred);
    color: gold;
    padding: 8px 40px;
    transform: rotate(45deg);
    font-weight: bold;
}

/* logo */
.logo-container {
    width: 120px;
    height: 120px;
    margin: auto;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: float 4s infinite;
}

@keyframes float {
    50% { transform: translateY(-10px); }
}

/* input */
input {
    width: 100%;
    height: 50px;
    margin-top: 20px;
    border-radius: 12px;
    border: none;
    text-align: center;
    font-size: 18px;
}

/* button */
button {
    width: 100%;
    height: 50px;
    margin-top: 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, red, orange);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* status */
#status {
    margin-top: 15px;
    font-weight: bold;
}

/* history */
.history-card {
    background: rgba(255,255,255,0.7);
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 10px;
}

/* footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #777;
    text-align: center;
}

</style>
</head>

<body>

<div class="fireworks"></div>

<div style="
background: linear-gradient(135deg,red,darkred);
color:gold;
padding:10px 20px;
border-radius:20px;
margin-bottom:20px;
font-weight:bold;
">
🇻🇳 Chào mừng 30/4 🇻🇳
</div>

<div class="neumorphic-card-light">

<div class="celebration-ribbon">30/4</div>

<div class="logo-container">
<img src="https://cdn.haitrieu.com/wp-content/uploads/2022/03/Logo-Dai-Hoc-Giao-Thong-Van-Tai-UTC.png" width="90">
</div>

<h2>ĐIỂM DANH</h2>

<input type="number" id="mssv" placeholder="Nhập MSSV">

<button onclick="handleAttendance()" id="btnSubmit">XÁC NHẬN</button>

<div id="status">Sẵn sàng</div>

</div>

<div id="history-list"></div>

<div class="footer">
Chào mừng 30/4/1975 - 30/4/2026
</div>

<script>
const fpPromise = import('https://openfpcdn.io/fingerprintjs/v4').then(FingerprintJS => FingerprintJS.load());

const scriptURL = 'https://script.google.com/macros/s/AKfycbzCByqoQ70J0732L9TkhIN0LeGxQcg2RMiLj3cIQ-D74qhI6BappOCU8tSenX-O7RfE/exec'; 
const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
const CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

async function handleAttendance() {
    const mssv = document.getElementById('mssv').value.trim();
    const status = document.getElementById('status');

    if (!mssv) {
        status.innerText = "❌ Nhập MSSV";
        return;
    }

    try {
        status.innerText = "🔒 Quét thiết bị...";
        const fp = await fpPromise;
        const fpResult = await fp.get();
        const deviceId = fpResult.visitorId;

        status.innerText = "🔍 Tìm BLE...";
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'TRAM-DIEM-DANH' }],
            optionalServices: [SERVICE_UUID]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHAR_UUID);

        const challenge = Math.floor(Math.random() * 9000) + 1000;
        await characteristic.writeValue(new TextEncoder().encode(challenge.toString()));

        await new Promise(r => setTimeout(r, 200));

        const value = await characteristic.readValue();
        const response = new TextDecoder().decode(value);
        device.gatt.disconnect();

        status.innerText = "☁️ Gửi dữ liệu...";
        const res = await fetch(`${scriptURL}?mssv=${mssv}&challenge=${challenge}&response=${response}&deviceId=${deviceId}`);
        const result = await res.text();

        status.innerText = result;

        const div = document.createElement("div");
        div.className = "history-card";
        div.innerText = mssv + " - " + result;
        document.getElementById("history-list").prepend(div);

    } catch (err) {
        status.innerText = "❌ Lỗi kết nối";
    }
}
</script>

</body>
</html>
