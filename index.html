<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh UTC2 - 3D Soft</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #eaf1f9;
            --card-color: #ffffff;
            --primary-color: #00306e;
            --accent-color: #70baff;
            --success: #2ecc71;
            --error: #e74c3c;
            
            --light-shadow: -8px -8px 16px rgba(255, 255, 255, 1);
            --dark-shadow: 8px 8px 16px rgba(0, 48, 110, 0.08);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            /* PHẦN QUAN TRỌNG: Căn giữa tuyệt đối */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Tránh chạm mép màn hình điện thoại */
            box-sizing: border-box;
        }

        .neumorphic-card-light {
            background: var(--card-color);
            padding: 40px 30px;
            border-radius: 35px;
            box-shadow: var(--dark-shadow), var(--light-shadow);
            width: 100%; /* Chiếm hết chiều rộng có thể */
            max-width: 400px; /* Nhưng không quá 400px */
            text-align: center;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.5);
            /* Đảm bảo căn giữa trong container cha */
            margin-left: auto;
            margin-right: auto;
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            background: var(--card-color);
            box-shadow: 6px 6px 12px rgba(0, 48, 110, 0.1), 
                       -6px -6px 12px rgba(255, 255, 255, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float-light 6s ease-in-out infinite;
        }

        @keyframes float-light {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px); }
        }

        .logo-school {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h2 {
            font-size: 22px;
            font-weight: 900;
            margin: 0 0 10px 0;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .uni-name {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 35px;
            font-weight: 700;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: #f4f8fd; 
            border: 2px solid #dce6f2; 
            border-radius: 18px;
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-color);
            text-align: center;
            box-sizing: border-box;
            box-shadow: inset 3px 3px 6px rgba(0, 48, 110, 0.05), 
                        inset -3px -3px 6px rgba(255, 255, 255, 1);
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            background: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(112, 186, 255, 0.2),
                        inset 2px 2px 4px rgba(0, 48, 110, 0.03); 
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #70baff 0%, #a2d6ff 100%);
            color: var(--primary-color);
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 8px rgba(0, 48, 110, 0.15), 
                       -4px -4px 8px rgba(255, 255, 255, 1);
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: inset 4px 4px 8px rgba(0, 48, 110, 0.1);
        }

        #status-container {
            margin-top: 25px;
            min-height: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #eee;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #b0bec5;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="neumorphic-card-light">
    <div class="logo-container">
        <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/03/Logo-Dai-Hoc-Giao-Thong-Van-Tai-UTC.png" class="logo-school" alt="UTC Logo">
    </div>
    
    <h2>ĐIỂM DANH SINH VIÊN</h2>
    <div class="uni-name">TRƯỜNG ĐẠI HỌC GIAO THÔNG VẬN TẢI<br>PHÂN HIỆU TẠI TP.HCM</div>

    <div class="input-group">
        <input type="number" id="mssv" placeholder="Nhập MSSV" autocomplete="off">
    </div>

    <button onclick="handleAttendance()" id="btnSubmit">XÁC NHẬN CÓ MẶT</button>

    <div id="status-container">
        <div class="loader" id="spinner"></div>
        <div id="status" style="font-weight: 800; font-size: 14px;">Sẵn sàng kết nối</div>
    </div>

    <div class="footer">
        © 2026 Nghiên cứu khoa học<br>
        Bảo mật: ESP32 BLE + Cloud Anti-Cheat
    </div>
</div>

<script>
    // ... Giữ nguyên phần Script của bạn vì nó đã chạy tốt ...
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwB3JIlliq5Qsd53uEH6UdsxS-WjNE6yO4DQkTeeYYbNuNeSiNEul4XWzZoOVLIMua8/exec'; 
    const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
    const CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

    function getDeviceId() {
        let id = localStorage.getItem('utc2_device_id');
        if (!id) {
            id = 'UTC2-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('utc2_device_id', id);
        }
        return id;
    }

    async function handleAttendance() {
        const mssv = document.getElementById('mssv').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('spinner');

        if (!mssv) {
            status.style.color = "var(--error)";
            status.innerText = "❌ Vui lòng nhập MSSV!";
            return;
        }

        try {
            btn.disabled = true;
            loader.style.display = "block";
            status.style.color = "var(--primary-color)";
            status.innerText = "🔍 Đang tìm Trạm BLE...";

            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'TRAM-DIEM-DANH' }],
                optionalServices: [SERVICE_UUID]
            });

            status.innerText = "🔗 Kiểm tra bảo mật...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_UUID);

            const challenge = Math.floor(Math.random() * 9000) + 1000;
            await characteristic.writeValue(new TextEncoder().encode(challenge.toString()));
            await new Promise(r => setTimeout(r, 250)); 
            const value = await characteristic.readValue();
            const response = new TextDecoder().decode(value);
            device.gatt.disconnect();

            status.innerText = "☁️ Đang đồng bộ...";
            const finalUrl = `${scriptURL}?mssv=${mssv}&challenge=${challenge}&response=${response}&deviceId=${getDeviceId()}`;
            const apiRes = await fetch(finalUrl);
            const result = await apiRes.text();
            
            loader.style.display = "none";
            btn.disabled = false;

            if (result.includes("Thành công")) {
                status.style.color = "var(--success)";
                status.innerHTML = "✅ " + result;
                document.getElementById('mssv').value = ""; 
            } else {
                status.style.color = "var(--error)";
                status.innerHTML = "⚠️ " + result;
            }
        } catch (err) {
            loader.style.display = "none";
            btn.disabled = false;
            status.style.color = "var(--error)";
            status.innerText = "❌ Lỗi: Kết nối thất bại!";
        }
    }
</script>

</body>
</html>
