<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh UTC2</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #00a8ff;
            --bg: #f0f2f5;
            --card: #ffffff;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, #d1d1d1 1px, transparent 0);
            background-size: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .attendance-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .logo-school {
            width: 120px; /* Kích thước vừa vặn cho điện thoại */
            height: auto;
            transition: transform 0.5s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .logo-school:hover {
            transform: scale(1.1) rotate(3deg);
        }

        h2 {
            color: var(--primary);
            margin: 10px 0 5px 0;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .uni-name {
            font-size: 12px;
            color: #555;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="attendance-card">
    <div class="logo-container">
        <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/03/Logo-Dai-Hoc-Giao-Thong-Van-Tai-UTC.png" class="logo-school" alt="UTC Logo">
    </div>
    
    <h2>ĐIỂM DANH SINH VIÊN</h2>
    <div class="uni-name">TRƯỜNG ĐẠI HỌC GIAO THÔNG VẬN TẢI<br>PHÂN HIỆU TẠI TP. HỒ CHÍ MINH</div>

    <div class="input-box">
        <input type="number" id="mssv" placeholder="Nhập MSSV của bạn" autocomplete="off">
    </div>

    <button onclick="handleAttendance()" id="btnSubmit">
        <span>XÁC NHẬN CÓ MẶT</span>
    </button>

    <div id="status-container">
        <div class="loader" id="spinner"></div>
        <div id="status">Sẵn sàng điểm danh</div>
    </div>

    <div class="footer">
        © 2026 Nghiên cứu khoa học_ Made by University of Transport and Communications - Campus in Ho Chi Minh City <br>
        Bảo mật 2 lớp: Phần cứng BLE + Cloud Anti-Cheat
    </div>
</div>

<script>
    // DÁN LINK GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwB3JIlliq5Qsd53uEH6UdsxS-WjNE6yO4DQkTeeYYbNuNeSiNEul4XWzZoOVLIMua8/exec'; 
    const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
    const CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

    function getDeviceId() {
        let id = localStorage.getItem('utc2_device_id');
        if (!id) {
            id = 'UTC2-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('utc2_device_id', id);
        }
        return id;
    }

    async function handleAttendance() {
        const mssv = document.getElementById('mssv').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('spinner');

        if (!mssv) {
            status.style.color = "var(--error)";
            status.innerText = "❌ Vui lòng nhập MSSV!";
            return;
        }

        try {
            btn.disabled = true;
            loader.style.display = "block";
            status.style.color = "var(--primary)";
            status.innerText = "🔍 Đang tìm Trạm BLE...";

            // 1. Quét Bluetooth
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'TRAM-DIEM-DANH' }],
                optionalServices: [SERVICE_UUID]
            });

            status.innerText = "🔗 Đang bắt tay bảo mật...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_UUID);

            // 2. Trao đổi mã Challenge/Response
            const challenge = Math.floor(Math.random() * 9000) + 1000;
            const encoder = new TextEncoder();
            await characteristic.writeValue(encoder.encode(challenge.toString()));
            
            await new Promise(r => setTimeout(r, 250)); // Chờ ESP32 tính toán

            const value = await characteristic.readValue();
            const response = new TextDecoder().decode(value);
            
            device.gatt.disconnect();

            // 3. Gửi lên Google Sheets
            status.innerText = "☁️ Đang đồng bộ Cloud...";
            const deviceId = getDeviceId();
            const finalUrl = `${scriptURL}?mssv=${mssv}&challenge=${challenge}&response=${response}&deviceId=${deviceId}`;
            
            const apiResponse = await fetch(finalUrl);
            const result = await apiResponse.text();
            
            loader.style.display = "none";
            btn.disabled = false;

            if (result.includes("Thành công")) {
                status.style.color = "var(--success)";
                status.innerHTML = "🎉 " + result;
                document.getElementById('mssv').value = ""; // Xóa mssv sau khi thành công
            } else {
                status.style.color = "var(--error)";
                status.innerHTML = "⚠️ " + result;
            }

        } catch (err) {
            loader.style.display = "none";
            btn.disabled = false;
            status.style.color = "var(--error)";
            status.innerText = "❌ Lỗi: Kết nối bị hủy hoặc lỗi trạm!";
            console.error(err);
        }
    }
</script>

</body>
</html>
