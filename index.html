<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh UTC2 - Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #eaf1f9;
            --card-color: #ffffff;
            --primary-color: #003366;
            --accent-color: #4da6ff;
            --success: #2ecc71;
            --error: #e74c3c;
            --golden: #f1c40f;
            --input-bg: #f4f8fd;
            --input-border: #e0e9f5;
            --dark-shadow: 8px 8px 16px rgba(0, 51, 102, 0.1);
            --light-shadow: -8px -8px 16px rgba(255, 255, 255, 0.8);
            --inset-dark: inset 4px 4px 8px rgba(0, 51, 102, 0.05);
            --inset-light: inset -4px -4px 8px rgba(255, 255, 255, 1);
        }

        body.dark-mode {
            --bg-color: #1a1e24;
            --card-color: #1a1e24;
            --primary-color: #e0e9f5; 
            --accent-color: #66b3ff;
            --input-bg: #14171c; 
            --input-border: #232830;
            --dark-shadow: 8px 8px 16px rgba(0, 0, 0, 0.4); 
            --light-shadow: -8px -8px 16px rgba(255, 255, 255, 0.03); 
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.4s ease;
        }

        .neumorphic-card {
            background: var(--card-color);
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: var(--dark-shadow), var(--light-shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
        }

        /* Streak Badge */
        .streak-container {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--golden);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 100;
        }

        .logo-container {
            width: 100px; height: 100px;
            margin: 10px auto 20px auto;
            border-radius: 50%;
            background: var(--card-color);
            box-shadow: var(--dark-shadow), var(--light-shadow);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-school { width: 70px; }

        h2 { font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .funny-msg { font-size: 13px; color: var(--accent-color); font-weight: 500; margin: 15px 0; min-height: 32px; }

        /* Progress Bar */
        .progress-wrapper { width: 100%; margin: 20px 0; text-align: left; }
        .progress-label { font-size: 11px; font-weight: 700; color: #8a9ba8; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .progress-bg { width: 100%; height: 10px; background: var(--input-bg); border-radius: 10px; box-shadow: var(--inset-dark), var(--inset-light); overflow: hidden; }
        .progress-fill { width: 75%; height: 100%; background: linear-gradient(90deg, var(--accent-color), #0073e6); transition: width 1s ease; }

        input[type="number"] {
            width: 100%; height: 50px; background: var(--input-bg); border: 2px solid var(--input-border);
            border-radius: 15px; font-size: 18px; font-weight: 700; color: var(--primary-color);
            text-align: center; box-shadow: var(--inset-dark), var(--inset-light); outline: none;
        }

        button#btnSubmit {
            width: 100%; height: 55px; background: linear-gradient(135deg, #66b3ff 0%, #0073e6 100%);
            color: #fff; border: none; border-radius: 15px; font-size: 16px; font-weight: 900;
            cursor: pointer; margin-top: 20px; transition: all 0.3s;
        }
        button#btnSubmit:active { transform: scale(0.98); }

        #status-container { margin-top: 20px; min-height: 50px; font-size: 14px; font-weight: 700; }
        .loader { display: none; width: 20px; height: 20px; border: 3px solid var(--input-border); border-top: 3px solid var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .history-card {
            background: var(--card-color); padding: 15px; border-radius: 15px;
            box-shadow: var(--dark-shadow), var(--light-shadow); margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px;
        }

        .footer { margin-top: auto; padding: 20px; font-size: 11px; color: #8a9ba8; text-align: center; }

        /* Mobile Blocker */
        #desktop-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="desktop-blocker">
    <h1 style="font-size: 50px;">📱</h1>
    <h2>VUI LÒNG DÙNG ĐIỆN THOẠI</h2>
    <p>Hệ thống yêu cầu quét Bluetooth thực tế.<br>Vui lòng không sử dụng PC/Laptop.</p>
</div>

<div class="neumorphic-card" id="main-app">
    <div class="streak-container" id="streak-badge">
        🔥 <span id="streak-count">0</span> DAYS
    </div>

    <div class="logo-container">
        <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/03/Logo-Dai-Hoc-Giao-Thong-Van-Tai-UTC.png" class="logo-school">
    </div>

    <h2>ĐIỂM DANH SINH VIÊN</h2>
    <div id="funny-msg" class="funny-msg">Chào bạn! Chúc một ngày học tập hiệu quả.</div>

    <div class="progress-wrapper">
        <div class="progress-label">
            <span>TIẾN ĐỘ LỚP HỌC</span>
            <span id="prog-val">75%</span>
        </div>
        <div class="progress-bg"><div class="progress-fill" id="progress-bar"></div></div>
    </div>

    <input type="number" id="mssv" placeholder="Nhập MSSV của bạn" autocomplete="off">

    <button onclick="handleAttendance()" id="btnSubmit">XÁC NHẬN CÓ MẶT</button>

    <div id="status-container">
        <div class="loader" id="spinner"></div>
        <div id="status">Sẵn sàng kết nối</div>
    </div>
</div>

<div id="history-list" style="width: 100%; max-width: 400px;"></div>

<div class="footer">
    Kỷ niệm 30/4/2026 - Giải phóng miền Nam<br>
    © Nguyễn Văn Hậu - UTC2 - S3 8R16 Powered
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script src="https://openfpcdn.io/fingerprintjs/v4/iife.min.js"></script>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxpXuRvNKvJy2C6weXHXNLmpUQ_zdmQPp7lTOdev-1mCa-CYMVilFUe_Zyo8o1vytPe/exec';
    const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
    const CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

    const funnyQuotes = [
        "Đến sớm thế này, chắc chắn là học bá rồi! 📚",
        "Chạy ngay đi trước khi thầy chốt sổ! 🏃‍♂️",
        "Chào chiến hữu! Hôm nay trông bạn rất tỉnh táo. ☕",
        "Sắp thành Thánh chuyên cần rồi, cố lên! 🔥",
        "Đi học đầy đủ thế này crush mới để ý nhé! ❤️",
        "UTC2 hôm nay nắng đẹp, điểm danh cũng phải đẹp! ☀️"
    ];

    // Khởi tạo giao diện
    window.onload = () => {
        if (!/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            document.getElementById('desktop-blocker').style.display = 'flex';
        }
        updateStreakDisplay();
        document.getElementById('funny-msg').innerText = funnyQuotes[Math.floor(Math.random() * funnyQuotes.length)];
        
        // Giả lập tiến độ lớp cho sinh động
        const randomProg = Math.floor(Math.random() * 40) + 40;
        document.getElementById('progress-bar').style.width = randomProg + "%";
        document.getElementById('prog-val').innerText = randomProg + "%";
    };

    function updateStreakDisplay() {
        const streak = localStorage.getItem('utc2_streak') || 0;
        document.getElementById('streak-count').innerText = streak;
    }

    function celebrate() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#003366', '#4da6ff', '#f1c40f'] });
    }

    async function handleAttendance() {
        const mssv = document.getElementById('mssv').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('spinner');

        if (!mssv) return alert("Nhập MSSV đã Hậu ơi!");

        try {
            btn.disabled = true;
            loader.style.display = "block";
            status.innerText = "🔗 Đang tìm trạm điểm danh...";

            // 1. Quét Fingerprint
            const fp = await FingerprintJS.load();
            const fpResult = await fp.get();
            const deviceId = fpResult.visitorId;

            // 2. Kết nối BLE
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'TRAM-DIEM-DANH' }],
                optionalServices: [SERVICE_UUID]
            });
            
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_UUID);

            const challenge = Math.floor(Math.random() * 9000) + 1000;
            await characteristic.writeValue(new TextEncoder().encode(challenge.toString()));
            
            // Đợi 200ms để ESP32 xử lý xong
            await new Promise(r => setTimeout(r, 200));

            const value = await characteristic.readValue();
            const responseCode = new TextDecoder().decode(value);
            
            // NGẮT KẾT NỐI NGAY LẬP TỨC ĐỂ GIẢI PHÓNG ESP32
            device.gatt.disconnect();

            // 3. CƠ CHẾ JITTER: Dãn cách ngẫu nhiên 0-3 giây trước khi gửi lên Cloud
            status.innerText = "⏳ Đang xếp hàng vào Google Sheets...";
            const jitter = Math.floor(Math.random() * 3000);
            await new Promise(r => setTimeout(r, jitter));

            status.innerText = "☁️ Đang xác thực dữ liệu...";
            const finalUrl = `${scriptURL}?mssv=${mssv}&challenge=${challenge}&response=${responseCode}&deviceId=${deviceId}`;
            
            const apiRes = await fetch(finalUrl);
            const result = await apiRes.text();

            loader.style.display = "none";
            btn.disabled = false;

            if (result.includes("Thành công")) {
                celebrate();
                status.style.color = "var(--success)";
                status.innerText = "🎉 ĐIỂM DANH THÀNH CÔNG!";
                updateStreak();
                showHistory(mssv, true);
            } else {
                status.style.color = "var(--error)";
                status.innerText = "⚠️ " + result;
                showHistory(mssv, false);
            }

        } catch (err) {
            loader.style.display = "none";
            btn.disabled = false;
            status.style.color = "var(--error)";
            status.innerText = "❌ Lỗi kết nối. Hãy thử lại!";
            console.error(err);
        }
    }

    function updateStreak() {
        let streak = parseInt(localStorage.getItem('utc2_streak') || 0);
        const lastDate = localStorage.getItem('utc2_last_date');
        const today = new Date().toDateString();

        if (lastDate !== today) {
            streak++;
            localStorage.setItem('utc2_streak', streak);
            localStorage.setItem('utc2_last_date', today);
            updateStreakDisplay();
        }
    }

    function showHistory(mssv, success) {
        const list = document.getElementById('history-list');
        const card = document.createElement('div');
        card.className = 'history-card';
        card.innerHTML = `
            <div style="text-align:left">
                <div style="font-weight:900">${mssv}</div>
                <div style="font-size:11px; color:#8a9ba8">${new Date().toLocaleTimeString()}</div>
            </div>
            <div style="color:${success ? 'var(--success)' : 'var(--error)'}; font-weight:900">
                ${success ? 'XÁC NHẬN' : 'THẤT BẠI'}
            </div>
        `;
        list.prepend(card);
    }
</script>

</body>
</html>
