<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điểm Danh UTC2</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #00a8ff;
            --bg: #f0f2f5;
            --card: #ffffff;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, #d1d1d1 1px, transparent 0);
            background-size: 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .attendance-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo-school {
            width: 100px;
            height: auto;
            transition: transform 0.5s ease;
        }

        .logo-school:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h2 {
            color: var(--primary);
            margin: 10px 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .uni-name {
            font-size: 13px;
            color: #666;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s ease;
            color: var(--primary);
        }

        input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(0, 168, 255, 0.2);
            outline: none;
        }

        button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 86, 179, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0, 86, 179, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        #status-container {
            margin-top: 25px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* Hiệu ứng xoay khi chờ */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="attendance-card">
    <div class="logo-container">
        <img src="logo-utc2.png">
    </div>
    
    <h2>ĐIỂM DANH SINH VIÊN</h2>
    <div class="uni-name">PHÂN HIỆU ĐẠI HỌC GTVT TẠI TP.HCM</div>

    <div class="input-box">
        <input type="number" id="mssv" placeholder="Nhập MSSV của bạn" autocomplete="off">
    </div>

    <button onclick="handleAttendance()" id="btnSubmit">
        <span>XÁC NHẬN CÓ MẶT</span>
    </button>

    <div id="status-container">
        <div class="loader" id="spinner"></div>
        <div id="status">Sẵn sàng điểm danh</div>
    </div>

    <div class="footer">
        © 2026 Đồ án Kỹ thuật Điện tử - Viễn thông <br>
        Bảo mật 2 lớp: Phần cứng BLE + Cloud Anti-Cheat
    </div>
</div>

<script>
    // DÁN LINK GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwB3JIlliq5Qsd53uEH6UdsxS-WjNE6yO4DQkTeeYYbNuNeSiNEul4XWzZoOVLIMua8/exec'; 
    const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
    const CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

    function getDeviceId() {
        let id = localStorage.getItem('utc2_device_id');
        if (!id) {
            id = 'UTC2-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            localStorage.setItem('utc2_device_id', id);
        }
        return id;
    }

    async function handleAttendance() {
        const mssv = document.getElementById('mssv').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnSubmit');
        const loader = document.getElementById('spinner');

        if (!mssv) {
            status.style.color = "var(--error)";
            status.innerText = "❌ Vui lòng nhập MSSV!";
            return;
        }

        try {
            btn.disabled = true;
            loader.style.display = "block";
            status.style.color = "var(--primary)";
            status.innerText = "🔍 Đang tìm Trạm BLE...";

            // 1. Quét Bluetooth
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'TRAM-DIEM-DANH' }],
                optionalServices: [SERVICE_UUID]
            });

            status.innerText = "🔗 Đang bắt tay bảo mật...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_UUID);

            // 2. Trao đổi mã Challenge/Response
            const challenge = Math.floor(Math.random() * 9000) + 1000;
            const encoder = new TextEncoder();
            await characteristic.writeValue(encoder.encode(challenge.toString()));
            
            await new Promise(r => setTimeout(r, 250)); // Chờ ESP32 tính toán

            const value = await characteristic.readValue();
            const response = new TextDecoder().decode(value);
            
            device.gatt.disconnect();

            // 3. Gửi lên Google Sheets
            status.innerText = "☁️ Đang đồng bộ Cloud...";
            const deviceId = getDeviceId();
            const finalUrl = `${scriptURL}?mssv=${mssv}&challenge=${challenge}&response=${response}&deviceId=${deviceId}`;
            
            const apiResponse = await fetch(finalUrl);
            const result = await apiResponse.text();
            
            loader.style.display = "none";
            btn.disabled = false;

            if (result.includes("Thành công")) {
                status.style.color = "var(--success)";
                status.innerHTML = "🎉 " + result;
                document.getElementById('mssv').value = ""; // Xóa mssv sau khi thành công
            } else {
                status.style.color = "var(--error)";
                status.innerHTML = "⚠️ " + result;
            }

        } catch (err) {
            loader.style.display = "none";
            btn.disabled = false;
            status.style.color = "var(--error)";
            status.innerText = "❌ Lỗi: Kết nối bị hủy hoặc lỗi trạm!";
            console.error(err);
        }
    }
</script>

</body>
</html>
